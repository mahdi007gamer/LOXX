<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>در حال بروزرسانی | سرزمین لوکس</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars-container"></div>
    <div class="blob blob-blue"></div>
    <div class="blob blob-purple"></div>

    <main class="maintenance-container">
        <!-- Floating Cyber Accents -->
        <div class="accent accent-top-right">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
            <div class="line"></div>
        </div>
        <div class="accent accent-bottom-left">
            <div class="line"></div>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
        </div>

        <div class="glass-card">
            <!-- Animated Upgrade Icon -->
            <div class="icon-wrapper">
                <div class="glow-ring"></div>
                <div class="radar"></div>
                <svg class="upgrade-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2v8"></path>
                    <path d="M17 7l-5-5-5 5"></path>
                    <path d="M4 14a8 8 0 1 1 16 0A8 8 0 0 1 4 14z"></path>
                    <polyline points="12 14 12 14.01 12 18"></polyline>
                </svg>
            </div>

            <div class="content">
                <h1 class="main-title">SYSTEM <span class="highlight">UPGRADE</span></h1>
                <h2 class="sub-title">در حال بهینه‌سازی <span class="text-neon-blue">موتور بازی</span></h2>
                <p class="description">
                    تیم مهندسی لوکس در حال نصب تجهیزات جدید و ارتقای سرورهاست. 
                    به زودی با قدرت بیشتر و امکانات هیجان‌انگیزتر برمی‌گردیم!
                </p>
            </div>

            <!-- Progress Section -->
            <div class="progress-section">
                <div class="progress-info">
                    <span class="status-text">بارگذاری پچ جدید...</span>
                    <span class="percentage" id="percentage">0%</span>
                </div>
                <div class="progress-barrel">
                    <div class="progress-fill" id="progress-fill"></div>
                    <div class="progress-glow"></div>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" disabled>
                    <span>در حال انتظار...</span>
                </button>
                <button class="btn btn-outline" onclick="window.location.reload()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                    <span>بررسی مجدد</span>
                </button>
            </div>
        </div>

        <!-- Glitch Bars Decor -->
        <div class="glitch-bars">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
