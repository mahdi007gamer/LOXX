<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوکس | اولین و پیشرفته ترین پلتفرم گیمینگ فارسی</title>
    <link rel="stylesheet" href="/maintenance_page/style.css">
</head>
<body>
    <!-- Abstract Background -->
    <div class="stars-container"></div>
    <div class="glow-sphere glow-1"></div>
    <div class="glow-sphere glow-2"></div>

    <main class="maintenance-wrapper">
        <div class="glass-container">
            <!-- Header Badge -->
            <div class="badge-container">
                <div class="live-dot"></div>
                <span class="badge-text">SYSTEM UPGRADE IN PROGRESS</span>
            </div>

            <!-- Central Icon Architecture -->
            <div class="hero-icon-container">
                <div class="orbit-ring ring-1"></div>
                <div class="orbit-ring ring-2"></div>
                <div class="main-hex">
                    <svg viewBox="0 0 100 100" class="hex-svg">
                        <path d="M50 5 L90 25 L90 75 L50 95 L10 75 L10 25 Z" fill="none" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <svg class="inner-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        <path d="M12 8v4"></path>
                        <path d="M12 16h.01"></path>
                    </svg>
                </div>
            </div>

            <!-- Content Area -->
            <div class="text-content">
                <h1 class="brand-name">LOXX <span class="dot">.</span></h1>
                <h2 class="status-heading">لوکس در حال آپگرید شدن می‌باشد</h2>
                <p class="description">
                    در حال یکپارچه‌سازی پروتکل‌های جدید و بهینه‌سازی زیرساخت‌های گرافیکی هستیم. 
                    لطفاً تا اتمام عملیات شکیبا باشید.
                </p>
            </div>

            <!-- Professional Progress -->
            <div class="progress-module">
                <div class="module-header">
                    <div class="loading-spinner"></div>
                    <span class="module-status">در حال همگام‌سازی هسته‌ها...</span>
                    <span class="module-percent" id="percentage">0%</span>
                </div>
                <div class="progress-track">
                    <div class="progress-bar" id="progress-fill">
                        <div class="bar-shimmer"></div>
                    </div>
                </div>
            </div>

            <!-- Action Footer -->
            <div class="footer-actions">
                <button class="action-btn bypass-btn" disabled>
                    <span>عملیات خودکار</span>
                </button>
                <button class="action-btn refresh-btn" onclick="window.location.reload()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                    <span>تلاش مجدد</span>
                </button>
            </div>
        </div>

        <!-- Cyber Decoration -->
        <div class="corner-tech top-left"></div>
        <div class="corner-tech bottom-right"></div>
    </main>

    <script src="/maintenance_page/script.js"></script>
</body>
</html>
