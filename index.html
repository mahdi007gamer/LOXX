<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="enamad" content="46418638" />
    <title>LOXX - پیشرفته‌ترین پلتفرم گیمینگ فارسی</title>
    <style>
      /* Preloader overlay styling (before React mounts) */
      .preloader-overlay {
        background-color: #040408;
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        overflow: hidden;
      }
      .preloader-overlay::before {
        content: '';
        position: absolute;
        bottom: 50%;
        right: 50%;
        transform: translate(50%, 50%);
        width: 350px;
        height: 350px;
        background: radial-gradient(circle, rgba(0, 229, 255, 0.09) 0%, rgba(255, 0, 153, 0.05) 50%, transparent 100%);
        filter: blur(50px);
        animation: pulseBg 3s ease-in-out infinite alternate;
        pointer-events: none;
      }
      .preloader-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
        z-index: 10;
        direction: rtl;
        text-align: center;
        user-select: none;
      }
      .preloader-logo-wrap {
        position: relative;
        width: 120px;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .preloader-spinner {
        position: absolute;
        inset: -10px;
        border: 2px solid transparent;
        border-top-color: #00e5ff;
        border-bottom-color: #ff0099;
        border-radius: 50%;
        animation: spin 1.4s cubic-bezier(0.5, 0.1, 0.15, 1) infinite;
        filter: drop-shadow(0 0 8px rgba(0, 229, 255, 0.6)) drop-shadow(0 0 15px rgba(255, 0, 153, 0.4));
      }
      .preloader-logo {
        width: 75px;
        height: 75px;
        object-fit: contain;
        animation: pulseLogo 1.8s ease-in-out infinite alternate;
      }
      .preloader-text-primary {
        color: #ffffff;
        font-size: 20px;
        font-weight: 900;
        letter-spacing: -0.03em;
        margin: 0;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.25);
        animation: fadeInText 0.8s ease-out;
      }
      .preloader-text-secondary {
        color: #00e5ff;
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        margin: 6px 0 0 0;
        animation: pulseGlow 1.4s ease-in-out infinite alternate;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes pulseLogo {
        0% { transform: scale(0.92); opacity: 0.8; filter: drop-shadow(0 0 6px rgba(0, 229, 255, 0.35)); }
        100% { transform: scale(1.04); opacity: 1; filter: drop-shadow(0 0 18px rgba(255, 0, 153, 0.75)); }
      }
      @keyframes pulseBg {
        0% { transform: scale(0.85); opacity: 0.6; }
        100% { transform: scale(1.15); opacity: 1; }
      }
      @keyframes pulseGlow {
        0% { opacity: 0.55; text-shadow: 0 0 5px rgba(0, 229, 255, 0.3); }
        100% { opacity: 1; text-shadow: 0 0 12px rgba(0, 229, 255, 0.8), 0 0 20px rgba(0, 229, 255, 0.4); }
      }
      @keyframes fadeInText {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="preloader-overlay">
        <div class="preloader-container">
          <div class="preloader-logo-wrap">
            <div class="preloader-spinner"></div>
            <img class="preloader-logo" src="/logo.png" alt="LOXX" />
          </div>
          <div>
            <h2 class="preloader-text-primary" id="preloader-title">لوکس</h2>
            <p class="preloader-text-secondary">در حال آماده‌سازی و اتصال به شبکه گیمینگ لوکس...</p>
            <script>
              (function() {
                const isElectron = !!(window.electronAPI || (navigator.userAgent && navigator.userAgent.indexOf('Electron') > -1));
                const titleEl = document.getElementById('preloader-title');
                if (titleEl) {
                  titleEl.textContent = isElectron ? 'لوکس کلاینت' : 'لوکس';
                }
              })();
            </script>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
